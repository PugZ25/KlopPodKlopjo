name: Weekly Live Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-live-snapshot
  cancel-in-progress: false

jobs:
  refresh-live-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml/training/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r ml/training/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Refresh live municipality snapshot
        run: python scripts/data/build_live_municipality_risk_frontend_data.py

      - name: Verify production build
        run: npm run build --prefix frontend

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- frontend/src/data/liveMunicipalityRisk.ts; then
            echo "No live snapshot changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/data/liveMunicipalityRisk.ts
          git commit -m "chore: refresh live municipality risk snapshot"
          git push
